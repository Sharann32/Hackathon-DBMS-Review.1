version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ssc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: settings_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 250906
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgresql:/docker-entrypoint-initdb.d
    networks:
      - ssc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: ssc-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: configuration_assistant
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ssc-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend (SQL Layer)
  spring-backend:
    build:
      context: ./spring-backend
      dockerfile: Dockerfile
    container_name: ssc-spring-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/settings_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 250906
      JWT_SECRET: your-secret-key-min-256-bits-long-for-hs256-algorithm-security
      JWT_EXPIRATION: 86400000
    ports:
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ssc-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Node.js Backend (MongoDB Layer + Vector Search)
  node-backend:
    build:
      context: ./node-backend
      dockerfile: Dockerfile
    container_name: ssc-node-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/configuration_assistant?authSource=admin
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ssc-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # FastAPI Gateway
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ssc-gateway
    restart: unless-stopped
    environment:
      SPRING_BOOT_URL: http://spring-backend:9090
      NODE_BACKEND_URL: http://node-backend:3001
    ports:
      - "8000:8000"
    depends_on:
      spring-backend:
        condition: service_healthy
      node-backend:
        condition: service_healthy
    networks:
      - ssc-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ssc-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - ssc-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ssc-network:
    driver: bridge
    name: ssc-network

volumes:
  postgres_data:
    name: ssc-postgres-data
  mongodb_data:
    name: ssc-mongodb-data
